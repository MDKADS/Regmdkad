<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant Registration</title>
    <style>
        :root {
            --zoom-blue: #0b5cff;
            --zoom-dark: #232333;
            --bg-color: #f0f3f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%);
            background-size: 200% 200%;
            animation: gradientBG 10s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .modal {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            backdrop-filter: blur(10px);
        }
        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }
        h2 {
            text-align: center;
            color: var(--zoom-dark);
            margin-bottom: 20px;
        }
        .avatar-container {
            height: 120px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #fff;
        }
        .avatar-item {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .avatar-item:hover {
            transform: scale(1.1);
        }
        .avatar-item.selected {
            border-color: var(--zoom-blue);
            box-shadow: 0 0 10px rgba(11, 92, 255, 0.5);
            transform: scale(1.1);
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
            font-weight: 600;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            font-family: inherit;
            background-color: white;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--zoom-blue);
            box-shadow: 0 0 0 2px rgba(11, 92, 255, 0.2);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: var(--zoom-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        .btn:hover {
            background-color: #0046d6;
        }
        .btn:active {
            transform: scale(0.98);
        }
        #statusMessage {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
        .loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--zoom-blue);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="modal">
    <h2>Participant Registration</h2>
    
    <form id="regForm">
        <input type="hidden" id="role" name="role" value="participant">
        <input type="hidden" id="selectedAvatar" name="avatar" value="" required>

        <div class="input-group">
            <label>Select Avatar (Cartoons, Cute Toys, Animals)</label>
            <div class="avatar-container" id="avatarGrid">
                </div>
        </div>

        <div class="input-group">
            <label>Fullname</label>
            <input type="text" name="fullname" required placeholder="John Doe">
        </div>

        <div class="input-group">
            <label>Nickname</label>
            <input type="text" name="nickname" required placeholder="Johnny">
        </div>

        <div class="input-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div class="input-group">
            <label>Lokal</label>
            <input type="text" name="lokal" required placeholder="Your Lokal">
        </div>

        <div class="input-group">
            <label>Distrito</label>
            <input type="text" name="distrito" required placeholder="Your Distrito">
        </div>

        <div class="input-group">
            <label>Mobile Number</label>
            <input type="tel" name="mobile" required placeholder="+63 912 345 6789">
        </div>

        <div class="input-group">
            <label>Email address (optional)</label>
            <input type="email" name="email" placeholder="john@example.com">
        </div>

        <button type="submit" class="btn" id="submitBtn">Register</button>
        <div class="loader" id="loader"></div>
        <div id="statusMessage"></div>
    </form>
</div>

<script>
    // REPLACE THIS WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOHyjvNBhA-3YRKguJmRWFu9JIECtmpUE-wC7lEv1tO7ryJ0VfDX4NrmHJsxmwcnrtlQ/exec";

    const avatarGrid = document.getElementById('avatarGrid');
    const avatarInput = document.getElementById('selectedAvatar');
    
    // Updated styles: Added 'micah' (cartoons), 'big-ears'/'big-smile' (looney styles), and kept 'bottts' (cute toys)
    const styles = ['adventurer', 'bottts', 'fun-emoji', 'shapes', 'thumbs', 'micah', 'big-ears', 'big-smile', 'miniavs'];
    
    for (let i = 1; i <= 100; i++) {
        const style = styles[i % styles.length];
        const imgUrl = `https://api.dicebear.com/7.x/${style}/svg?seed=Avatar${i}&backgroundColor=e5e7eb`;
        
        const img = document.createElement('img');
        img.src = imgUrl;
        img.className = 'avatar-item';
        img.dataset.url = imgUrl;
        
        img.onclick = function() {
            document.querySelectorAll('.avatar-item').forEach(el => el.classList.remove('selected'));
            this.classList.add('selected');
            avatarInput.value = this.dataset.url;
        };
        avatarGrid.appendChild(img);
    }

    // Form Submission
    document.getElementById('regForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        if(!avatarInput.value) {
            alert("Please select an avatar!");
            return;
        }

        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('statusMessage');
        const formData = new FormData(this);

        btn.style.display = 'none';
        loader.style.display = 'block';

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors' // Required to bypass CORS errors for simple posts
        }).then(() => {
            loader.style.display = 'none';
            status.style.display = 'block';
            status.style.color = '#28a745';
            status.innerText = "Registration Successful!";
            this.reset();
            document.querySelectorAll('.avatar-item').forEach(el => el.classList.remove('selected'));
            avatarInput.value = '';
            setTimeout(() => { btn.style.display = 'block'; status.style.display = 'none'; }, 3000);
        }).catch(error => {
            loader.style.display = 'none';
            btn.style.display = 'block';
            status.style.display = 'block';
            status.style.color = 'red';
            status.innerText = "Error registering. Try again.";
        });
    });
</script>
</body>
</html>
